name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness-and-hygiene:
    name: Harness and Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run harness readiness
        run: python3 scripts/check_harness_readiness.py

      - name: Run repository hygiene check
        run: python3 scripts/check_repo_hygiene.py

  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    needs: harness-and-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff build

      - name: Lint and build
        run: |
          python -m ruff check apps/agents apps/backend
          python -m build apps/agents
          python -m build apps/backend

      - name: API contract checks
        run: python3 scripts/check_api_contracts.py

  mobile-checks:
    name: Mobile Checks
    runs-on: ubuntu-latest
    needs: harness-and-hygiene
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm exec prettier --check .

      - name: Lint check
        run: pnpm run lint:check

      - name: Typecheck
        run: pnpm run compile

      - name: Test
        run: pnpm run test -- --ci
